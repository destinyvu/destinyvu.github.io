<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESTINY SHOP</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#050009;
  color:white;
  font-family:Arial,sans-serif;
}

.age-gate{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.96);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.age-box{
  max-width:420px;
  background:#160020;
  border:1px solid #ff4fd8;
  box-shadow:0 0 35px rgba(255,79,216,.5);
  border-radius:22px;
  padding:30px;
  text-align:center;
}

.age-box button,.age-box a{
  display:inline-block;
  margin:8px;
  padding:11px 20px;
  border-radius:12px;
  border:none;
  text-decoration:none;
  font-weight:bold;
  cursor:pointer;
}

.age-box button{
  background:linear-gradient(135deg,#ff4fd8,#8b5cf6);
  color:white;
}

.age-box a{
  background:#21102d;
  color:white;
}

.page{
  width:100%;
  min-height:100vh;
  padding:25px 10px 50px;
  background:
    radial-gradient(circle at top left,rgba(255,0,170,.25),transparent 35%),
    radial-gradient(circle at top right,rgba(139,92,246,.28),transparent 35%),
    linear-gradient(135deg,#050009,#130019,#050009);
}

.showcase{
  position:relative;
  width:min(1500px,100%);
  aspect-ratio:16/9;
  margin:auto;
  background:url("banner.png") center/contain no-repeat;
  filter:drop-shadow(0 0 25px rgba(255,79,216,.6));
}

.video-box{
  position:absolute;
  border:1px solid rgba(255,79,216,.9);
  border-radius:10px;
  overflow:hidden;
  background:#000;
  box-shadow:
    0 0 14px rgba(255,79,216,.6),
    0 0 28px rgba(139,92,246,.35);
}

.video-box video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* ODA KUTULARI */
.room1{left:3.6%;top:53.4%;width:13.2%;height:16.2%}
.room2{left:19.1%;top:53.4%;width:13.2%;height:16.2%}
.room3{left:34.5%;top:53.4%;width:13.2%;height:16.2%}
.room4{left:50.2%;top:53.4%;width:13.2%;height:16.2%}
.room5{left:65.8%;top:53.4%;width:13.2%;height:16.2%}
.room6{left:81.2%;top:53.4%;width:13.2%;height:16.2%}

/* DİĞER ÜRÜN */
.product1{left:3.7%;top:85.4%;width:13.1%;height:11.6%}

.mobile-list{
  display:none;
}

footer{
  text-align:center;
  padding:25px;
  color:#ffc9f3;
  text-shadow:0 0 18px #ff4fd8;
  font-size:24px;
  font-weight:bold;
}

@media(max-width:800px){
  .showcase{
    aspect-ratio:16/9;
  }

  .video-box{
    border-radius:5px;
  }

  footer{
    font-size:18px;
  }
}
</style>
</head>

<body>

<div class="age-gate" id="ageGate">
  <div class="age-box">
    <h1>🔞 Adults Only</h1>
    <p>
      This website contains adult-oriented IMVU content.<br><br>
      By entering, you confirm that you are at least 18 years old.
    </p>
    <button onclick="enterSite()">Siteye Gir</button>
    <a href="https://google.com">Çık</a>
  </div>
</div>

<div class="page">
  <div class="showcase">

    <div class="video-box room1">
      <video controls muted loop playsinline>
        <source src="room1.mp4" type="video/mp4">
      </video>
    </div>

    <div class="video-box room2">
      <video controls muted loop playsinline>
        <source src="room2.mp4" type="video/mp4">
      </video>
    </div>

    <div class="video-box room3">
      <video controls muted loop playsinline>
        <source src="room3.mp4" type="video/mp4">
      </video>
    </div>

    <div class="video-box room4">
      <video controls muted loop playsinline>
        <source src="room4.mp4" type="video/mp4">
      </video>
    </div>

    <div class="video-box room5">
      <video controls muted loop playsinline>
        <source src="lastdinner.mp4" type="video/mp4">
      </video>
    </div>

    <div class="video-box room6">
      <video controls muted loop playsinline>
        <source src="modernroomv2.mp4" type="video/mp4">
      </video>
    </div>

    <div class="video-box product1">
      <video controls muted loop playsinline>
        <source src="product1.mp4" type="video/mp4">
      </video>
    </div>

  </div>

  <footer>
    ✨ Destiny Shop ✨
  </footer>
</div>

<script>
function enterSite(){
  document.getElementById("ageGate").style.display="none";
}
</script>

</body>
</html>
